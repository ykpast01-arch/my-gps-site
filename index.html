<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS位置情報表示 & 徒歩ルート案内</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 12px 24px; font-size: 16px; margin-bottom: 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        .result { font-weight: bold; margin-top: 10px; line-height: 1.6; }
        #map-container {
            margin-top: 20px;
            width: 100%;
            height: 450px; /* ルートが見やすいように少し高くしました */
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <h1>目的地への徒歩ルート案内</h1>
    <button id="get-location">現在地から目的地への徒歩ルートを表示</button>

    <div class="result">
        <p>あなたの現在地 緯度: <span id="latitude">---</span> / 経度: <span id="longitude">---</span></p>
        <p id="status"></p>
    </div>

    <!-- Googleマップを表示するためのインラインフレーム -->
    <iframe id="map-container"></iframe>

    <script>
        document.getElementById('get-location').addEventListener('click', () => {
            const status = document.getElementById('status');
            const latText = document.getElementById('latitude');
            const lngText = document.getElementById('longitude');
            const mapContainer = document.getElementById('map-container');

            if (!navigator.geolocation) {
                status.textContent = 'お使いのブラウザはGPSに対応していません。';
                return;
            }

            status.textContent = '位置情報を取得中...';

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    latText.textContent = lat;
                    lngText.textContent = lng;
                    status.textContent = '取得成功！徒歩ルートを計算して表示します。';

                    // 【ここが最大のポイント！】
                    // 目的地：東京都荒川区東尾久七丁目2番35号
                    const destination = "東京都荒川区東尾久七丁目2番35号";
                    
                    // Googleマップに「出発地(saddr)」「目的地(daddr)」「移動手段(dirflg=wで徒歩)」を伝えるURLを作成
                    // ※日本語の住所は自動的に安全な形（エンコード）に変換されます
                    const mapUrl = `https://maps.google.com/maps?saddr=${lat},${lng}&daddr=${encodeURIComponent(destination)}&dirflg=w&output=embed`;
                    
                    // 地図を表示
                    mapContainer.src = mapUrl;
                    mapContainer.style.display = 'block';
                },
                (error) => {
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            status.textContent = '位置情報の利用が許可されませんでした。';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            status.textContent = '位置情報が利用できません。';
                            break;
                        case error.TIMEOUT:
                            status.textContent = 'タイムアウトしました。';
                            break;
                        default:
                            status.textContent = 'エラー: ' + error.message;
                            break;
                    }
                },
                options
            );
        });
    </script>
</body>
</html>
